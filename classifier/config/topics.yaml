# ── GATE 1: Hard exclusion patterns (regex) ───────────────────────────────────
# Any article matching ANY of these is tagged EXCLUDED, score=0, pipeline stops.
exclude_patterns:
  # Entertainment / celebrity
  - '\bipl\b'
  - '\bcricket\b'
  - '\bbollywood\b'
  - '\bfilms?\b'
  - '\bcinema\b'
  - '\bbox\s+office\b'
  - '\bwedding\b'
  - '\bdivorce\b'
  - '\bbreakup\b'
  - '\bviral\b'
  - '\bmeme\b'
  - '\btrending\b'
  - '\bfollowers\b'
  - '\bcelebrity\b'
  - '\bactor\b'
  - '\bactress\b'
  - '\bsinger\b'
  - '\bitem\s+song\b'
  - '\bott\s+release\b'
  # Political drama / rhetoric (not policy)
  - '\bslams\b'
  - '\blashes\s+out\b'
  - '\bhits\s+out\b'
  - '\blashes\b.*\bpm\b'
  - '\blashes\b.*\bcm\b'
  - '\brally\b'
  - '\broadshow\b'
  - '\belection\s+speech\b'
  - '\bpolitical\s+vendetta\b'
  # Low-yield local crime / accidents
  - '\bcheated\b'
  - '\brobbery\b'
  - '\bmurder\b'
  - '\bhit[- ]and[- ]run\b'
  # Electoral noise (not institutional)
  - '\bbypolls?\b'
  - '\bvote\s+share\b'
  - '\bparty\s+symbol\b'
  - '\bexit\s+poll\b'
  - '\bopinion\s+poll\b'
  # Market ticker
  - '\bsensex\b'
  - '\bnifty\b'
  - '\bshare\s+price\b'
  # Vague / clickbait
  - '\bhoroscope\b'
  - '\bastrology\b'
  - '\bhow\s+to\b'
  - '\btop\s+\d+\b'
  - '\bbest\s+\d+\b'
  - '\bviral\s+story\b'
  - '\bhuman\s+interest\b'
  # UPSC coaching noise
  - '\b(clear(?:s|ed|ing)?|crack(?:s|ed)?)\s+upsc\b'
  # Weather / traffic
  - '\bweather\s+forecast\b'
  - '\btraffic\s+jam\b'
  # Sports results
  - '\bchampions\s+league\b'
  - '\bfootball\s+league\b'
  - '\bfifa\b'
  # Lifestyle
  - '\brecipe\b'
  - '\bfashion\s+week\b'
  - '\blifestyle\b'
  - '\bhoroscope\b'
  - '\bgossip\b'


# ── GATE 2A: Event-type bonuses (regex → score) ───────────────────────────────
# Applied to title + summary. Only the FIRST matching bonus is added (highest wins).
# Order matters — place higher-value patterns first.
event_bonuses:
  - pattern: '\b(constitution\s+bench|cji)\b'
    score: 20
    note: "constitution bench/CJI"

  - pattern: '\b(supreme\s+court|sc)\b.*?\b(landmark|historic|first.?ever|right\s+to\s+die|passive\s+euthanasia|right\s+to\s+privacy)\b'
    score: 18
    note: "SC landmark ruling"

  - pattern: '\b(supreme\s+court|high\s+court|sc|hc)\b.*?\b(says|observes|warns|rules|directs|stays|upholds|strikes\s+down)\b'
    score: 18
    note: "court order/ruling"

  - pattern: '\b(union\s+cabinet|central\s+govt|centre)\s+(approves?|clears?|nods?|okays?)\b'
    score: 18
    note: "union cabinet approval"

  - pattern: '\bparliament\s+passes?\b|\blok\s+sabha\s+passes?\b|\brajya\s+sabha\s+passes?\b'
    score: 15
    note: "parliamentary action"

  - pattern: '\bbill\s+(passed|cleared|enacted)\b|\bact\s+notified\b'
    score: 15
    note: "bill/act enacted"

  - pattern: '\bordinance\s+(promulgated|issued)\b'
    score: 14
    note: "ordinance issued"

  - pattern: '\bcabinet\s+(approves?|clears?|nods?)\b'
    score: 12
    note: "cabinet approval"

  - pattern: '\bsupreme\s+court\s+(orders?|rules?|holds?|upholds?)\b'
    score: 12
    note: "SC formal order"

  - pattern: '\bhigh\s+court\s+(orders?|rules?|holds?)\b'
    score: 10
    note: "HC formal order"

  - pattern: '\b(launches?|inaugurates?|rolls?\s+out)\b.*\b(scheme|mission|programme|yojana|portal|platform|initiative)\b'
    score: 12
    note: "scheme/mission launch"

  - pattern: '\b(report|survey|data|index|census)\s+(released?|published|shows?|reveals?)\b'
    score: 10
    note: "report/index released"

  - pattern: '\bindia\s+(ranks?|ranked|rises?|slips?)\b'
    score: 10
    note: "India ranking"

  - pattern: '\b(mou|agreement|treaty|accord)\s+(signed|inked|finalised)\b|\bsigns?\s+(mou|agreement|treaty)\b'
    score: 10
    note: "treaty/agreement signed"

  - pattern: '\bbudget\s+(allocates?|presents?|proposes?)\b|\bfinance\s+commission\b'
    score: 12
    note: "budget/finance commission"

  - pattern: '\b(cpi|wpi|inflation|gdp|fiscal\s+deficit)\b'
    score: 15
    note: "macro economic indicator"

  - pattern: '\b(vaccine|immunisation|vaccination\s+programme)\b'
    score: 12
    note: "health programme"

  - pattern: '\b(net\s+zero|renewable\s+energy|green\s+hydrogen|sustainable\s+energy)\b'
    score: 12
    note: "clean energy policy"


# ── GATE 2B: Statement / drama penalties (applied to TITLE only) ─────────────
statement_penalties:
  - pattern: '^(modi|rahul|kejriwal|shah|mamata|yogi|fadnavis|shinde|gehlot|nitish|chandrashekhar)\b.*\b(says?|said|claims?|demands?|urges?|calls?\s+for|warns?|vows?|pledges?|promises?)\b'
    score: -20
    note: "politician statement"

  - pattern: '^(?!(supreme\s+court|rbi|niti\s+aayog|ec|government|centre|sc|hc|cji|parliament|ministry))\w+\s+\w+\s+(says?|said|claims?|alleges?|demands?|urges?)\b'
    score: -15
    note: "unnamed statement"

  - pattern: '\bpromises?\b|\bvows?\s+to\b|\bpledges?\s+to\b'
    score: -12
    note: "political promise"

  - pattern: '\bopposition\s+(demands?|attacks?|slams?|walks?\s+out)\b|\bwalkout\b'
    score: -15
    note: "opposition rhetoric"

  - pattern: '\b(wins?|loses?|elected|defeated)\b.*\b(election|seat|constituency)\b'
    score: -15
    note: "electoral result"

  - pattern: '\bsays?\s+(iran|china|russia|us|u\.?s\.?|officials?)\b'
    score: -18
    note: "foreign official statement"

  - pattern: '^will\s+urge\b'
    score: -18
    note: "speculative urge"

  - pattern: '\bhints?\s+at\b.*\bsuccessor\b|\b(successor|heir\s+apparent)\b'
    score: -30
    note: "succession chatter"


