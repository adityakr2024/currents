# ── GATE 3: Special topic boosters ───────────────────────────────────────────
# These are high-yield UPSC topics that deserve score boosts on top of base.
# Boosters are ADDITIVE (multiple can fire). Total capped by gates.yaml:boost_max.
boosters:
  - name: "SC Landmark / Constitutional"
    score: 25
    patterns:
      - '\b(supreme\s+court|sc)\b.*\b(landmark|constitutional|historic|first.?ever|precedent)\b'
      - '\bbasic\s+structure\b'
      - '\bconstitution\s+bench\b'
      - '\bfundamental\s+rights?\b.*\b(upheld|violated|expanded|reading)\b'

  - name: "Constitutional Amendment"
    score: 22
    patterns:
      - '\bconstitutional\s+amendment\b'
      - '\b\d+\w{0,2}\s+amendment\b'
      - '\barticle\s+\d+\b.*\bamend(ed|ment)\b'

  - name: "Menstrual / Reproductive Policy"
    score: 20
    patterns:
      - '\bmenstrual\s+leave\b'
      - '\bmenstruation\b.*\b(policy|leave|right|law)\b'
      - '\breproductive\s+rights?\b'
      - '\bmaternity\s+(benefit|leave|policy)\b.*\b(court|government|bill|act)\b'

  - name: "Uniform Civil Code"
    score: 20
    patterns:
      - '\buniform\s+civil\s+code\b'
      - '\bucc\b'

  - name: "Electoral Reforms / Delimitation"
    score: 18
    patterns:
      - '\bdelimitation\s+commission\b'
      - '\bone\s+nation\s+one\s+election\b'
      - '\bsimultaneous\s+election\b'
      - '\belectoral\s+bond\b'
      - '\belectoral\s+reform\b'

  - name: "Two-State / Geopolitical Doctrine"
    score: 15
    patterns:
      - '\btwo.?state\s+solution\b'
      - '\bstring\s+of\s+pearls\b'
      - '\bnuclear\s+doctrine\b'
      - '\bno.?first.?use\b'
      - '\bindian\s+ocean\s+region\b'
      - '\bindo.?pacific\s+strategy\b'

  - name: "Global / India Index Ranking"
    score: 15
    patterns:
      - '\b(human\s+development\s+index|global\s+hunger\s+index|ease\s+of\s+doing\s+business|global\s+innovation\s+index|press\s+freedom\s+index|corruption\s+perceptions\s+index)\b'
      - '\bindia\s+rank(s|ed)?\s+\d+\b'

  - name: "Climate / Environment Treaty"
    score: 14
    patterns:
      - '\bnagoya\s+protocol\b'
      - '\bparis\s+agreement\b'
      - '\bkunming.?montreal\b'
      - '\bcartagena\s+protocol\b'
      - '\bkyoto\s+protocol\b'
      - '\bcbd\b.*\bbiodiversity\b'

  - name: "BEPS / Tax Policy"
    score: 14
    patterns:
      - '\bbeps\b'
      - '\bp.?notes?\b'
      - '\bglobal\s+minimum\s+tax\b'
      - '\bpillar\s+(one|two|1|2)\b.*\btax\b'

  - name: "Space / Defence Milestone"
    score: 12
    patterns:
      - '\b(gaganyaan|chandrayaan|aditya.?l1|mangalyaan)\b'
      - '\bfirst\s+(indian|woman|private)\b.*\b(space|launch|mission)\b'
      - '\btejas\b.*\b(mk|mark)\b'
      - '\barjun\s+tank\b'


# ── Action phrases in title (strong signal of concrete government action) ─────
# These are checked in the article TITLE only. Presence adds a flat bonus.
action_phrases:
  - launches
  - inaugurates
  - approves
  - passes
  - orders
  - rules
  - holds
  - signs
  - ratifies
  - enacts
  - notifies
  - releases
  - publishes
  - allocates
  - sanctions
  - commissions
  - operationalises
  - amends
  - strikes down
  - commissions


# ── GS paper fallback priority (used when multiple topics match) ──────────────
# If tagger finds multiple GS papers, pick highest-weight topic's paper.
# Tie-break order: GS2 > GS3 > GS1 > GS4
gs_priority:
  - GS2
  - GS3
  - GS1
  - GS4


