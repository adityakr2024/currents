# notes_web_builder/web_builder.yml
# Copy to: .github/workflows/web_builder.yml
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE:
#   Run notes_web_builder.py to generate a self-contained bilingual HTML site
#   from the latest notes JSON, then deploy it to GitHub Pages (docs/ folder).
#
# TRIGGERS:
#   • workflow_call  — called automatically by notes_writer.yml after it commits
#   • workflow_dispatch — run manually from Actions tab
#
# INPUTS:
#   date        — YYYY-MM-DD (leave blank for "latest in data/notes/")
#   dry_run     — "true" to build without writing/committing (for testing)
#
# OUTPUTS:
#   docs/index.html   — committed to the repo; served by GitHub Pages
#
# GITHUB PAGES SETUP (one-time):
#   Settings → Pages → Source: "Deploy from a branch"
#   Branch: main (or master) | Folder: /docs
# ─────────────────────────────────────────────────────────────────────────────

name: "Build Web (notes_web_builder)"

on:
  workflow_call:
    inputs:
      date:
        type: string
        default: ""
        description: "Date YYYY-MM-DD. Blank = latest in data/notes/"
      dry_run:
        type: string
        default: "false"
        description: "Build without writing output"
    outputs:
      deployed_date:
        description: "The date for which the page was built"
        value: ${{ jobs.build_web.outputs.deployed_date }}
      output_size_kb:
        description: "Size of generated index.html in KB"
        value: ${{ jobs.build_web.outputs.output_size_kb }}

  workflow_dispatch:
    inputs:
      date:
        description: "Date YYYY-MM-DD (blank = latest)"
        required: false
        default: ""
      dry_run:
        description: "Dry run? (build only, no commit)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Prevent concurrent builds writing to docs/ simultaneously
concurrency:
  group: web-builder-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build_web:
    name: "Generate bilingual HTML site"
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit docs/index.html

    outputs:
      deployed_date:  ${{ steps.build.outputs.deployed_date }}
      output_size_kb: ${{ steps.build.outputs.output_size_kb }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so git log works

      - name: Pull latest commits
        run: git pull --rebase origin "${{ github.ref_name }}"

      # ── 2. Python (no pip install needed — stdlib only) ───────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No cache-dependency-path — zero pip deps

      # ── 3. Resolve date ───────────────────────────────────────────────────────
      - name: Resolve target date
        id: resolve_date
        run: |
          INPUT_DATE="${{ inputs.date || github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            # Validate format before passing to Python
            if ! echo "$INPUT_DATE" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "ERROR: --date must be YYYY-MM-DD, got: $INPUT_DATE"
              exit 1
            fi
            TARGET_DATE="$INPUT_DATE"
          else
            # Auto-detect: find the latest date dir that has notes JSON
            TARGET_DATE=$(
              find data/notes -maxdepth 2 -name "notes_*.json" 2>/dev/null \
              | sed 's|data/notes/||;s|/notes_.*||' \
              | sort -r \
              | head -1
            )
            if [ -z "$TARGET_DATE" ]; then
              echo "ERROR: No notes data found in data/notes/. Run notes_writer first."
              exit 1
            fi
          fi
          echo "TARGET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "Resolved date: $TARGET_DATE"

      # ── 4. Verify input data exists ───────────────────────────────────────────
      - name: Verify notes data
        run: |
          COUNT=$(find "data/notes/$TARGET_DATE" -name "notes_*.json" 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            # Try fallback path
            COUNT=$(find "data/filtered/$TARGET_DATE" -name "toplist_*.json" 2>/dev/null | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "ERROR: No notes_*.json in data/notes/$TARGET_DATE"
              echo "       and no toplist_*.json in data/filtered/$TARGET_DATE"
              echo "       Run notes_writer.yml first."
              exit 1
            fi
            echo "WARNING: Using fallback toplist data (notes_writer not yet run for $TARGET_DATE)"
          fi
          echo "Input data: $COUNT file(s) found for $TARGET_DATE"

      # ── 5. Build HTML ─────────────────────────────────────────────────────────
      - name: Build HTML
        id: build
        run: |
          DRY="${{ inputs.dry_run || github.event.inputs.dry_run }}"

          if [ "$DRY" = "true" ]; then
            python notes_web_builder/notes_web_builder.py \
              --date "$TARGET_DATE" \
              --data-dir data \
              --dry-run
            echo "deployed_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
            echo "output_size_kb=0"           >> "$GITHUB_OUTPUT"
          else
            mkdir -p docs
            python notes_web_builder/notes_web_builder.py \
              --date    "$TARGET_DATE" \
              --data-dir data \
              --out-file docs/index.html
            SIZE_KB=$(du -k docs/index.html | cut -f1)
            echo "deployed_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
            echo "output_size_kb=$SIZE_KB"    >> "$GITHUB_OUTPUT"
            echo "Built: docs/index.html  (${SIZE_KB} KB)"
          fi

      # ── 6. Commit and push ────────────────────────────────────────────────────
      - name: Commit docs/index.html
        if: ${{ inputs.dry_run != 'true' && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          TS=$(TZ="Asia/Kolkata" date '+%H:%M IST')
          if git diff --cached --quiet; then
            echo "docs/index.html unchanged — nothing to commit."
          else
            git commit -m "web: $TARGET_DATE at $TS [skip ci]"
            git pull --rebase --autostash origin "${{ github.ref_name }}"
            git push
            echo "Committed and pushed docs/index.html"
          fi

      # ── 7. Upload artifact (always) ───────────────────────────────────────────
      - name: Upload HTML artifact
        if: ${{ inputs.dry_run != 'true' && github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ env.TARGET_DATE }}-run${{ github.run_number }}
          path: docs/index.html
          retention-days: 14
          if-no-files-found: warn

      # ── 8. Step summary ───────────────────────────────────────────────────────
      - name: Step summary
        if: always()
        run: |
          DRY="${{ inputs.dry_run || github.event.inputs.dry_run }}"
          echo "### Web Builder \u2014 $TARGET_DATE" >> "$GITHUB_STEP_SUMMARY"
          echo ""  >> "$GITHUB_STEP_SUMMARY"
          if [ -f docs/index.html ]; then
            SIZE=$(du -k docs/index.html | cut -f1)
            echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|"         >> "$GITHUB_STEP_SUMMARY"
            echo "| Date | \`$TARGET_DATE\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Output | \`docs/index.html\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Size | ${SIZE} KB |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Dry run | ${DRY:-false} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| GitHub Pages | https://\${{ github.repository_owner }}.github.io/\${{ github.event.repository.name }}/ |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Dry run \u2014 no file written._" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 9. Notify on failure ──────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Web builder failed \u2014 ${process.env.TARGET_DATE}`,
              body: [
                `**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                `**Step:** Build HTML`,
                `**Branch:** ${{ github.ref_name }}`,
              ].join('\n'),
              labels: ['bug', 'automated'],
            });
